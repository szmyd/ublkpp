name: UblkPP Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - feature/*

jobs:
  GccAddressSanitize:
    uses: ./.github/workflows/build_commit.yml
    with:
      platform: "ubuntu-24.04"
      build-type: "Debug"
      malloc-impl: "libc"
      compiler: "gcc"
      conan-channel: "dev"
      tooling: "AddressSanitize"

  GccThreadSanitize:
    uses: ./.github/workflows/build_commit.yml
    with:
      platform: "ubuntu-24.04"
      build-type: "Debug"
      malloc-impl: "libc"
      compiler: "gcc"
      conan-channel: "dev"
      tooling: "ThreadSanitize"

  GccCoverage:
    uses: ./.github/workflows/build_commit.yml
    with:
      platform: "ubuntu-24.04"
      build-type: "Debug"
      malloc-impl: "libc"
      compiler: "gcc"
      conan-channel: "dev"
      tooling: "Coverage"

  ClangRelease:
    uses: ./.github/workflows/build_commit.yml
    with:
      platform: "ubuntu-24.04"
      build-type: "Release"
      malloc-impl: "libc"
      compiler: "clang"
      conan-channel: "dev"
      tooling: "None"
